<!doctype html>
<html lang="zh-CN" class="theme-snow">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>洛克王国虚拟助手</title>
    <link rel="icon" href="/favicon.svg?v=20260507-2" />
    <link rel="stylesheet" href="/styles.css?v=20260507-2" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="logo-mark" aria-hidden="true">洛</div>
          <div>
            <strong>Rock Kingdom Assistant</strong>
            <span>洛克王国资料工作台</span>
          </div>
        </div>

        <button class="new-chat" id="newChat" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
          新对话
        </button>

        <nav class="nav-list" aria-label="主导航">
          <button class="nav-item active" data-view="assistant" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"></path></svg>
            助手问答
          </button>
          <button class="nav-item" data-view="spirits" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 4 7v10l8 4 8-4V7l-8-4Z"></path><path d="m4 7 8 4 8-4M12 11v10"></path></svg>
            精灵资料
          </button>
          <button class="nav-item" data-view="groups" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10v10H7z"></path><path d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3zM15 15h6v6h-6z"></path></svg>
            蛋组浏览
          </button>
          <button class="nav-item" data-view="exchange" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 1l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 23l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
            交换记录
          </button>
        </nav>

        <div class="sidebar-footer">
          <label class="mini-field">
            <span>访问密码</span>
            <input id="password" type="password" placeholder="未设置可留空" />
          </label>
          <div class="model-chip" id="modelStatus">本地资料已加载</div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Rock Kingdom Assistant</p>
            <h1 id="viewTitle">助手问答</h1>
          </div>
          <div class="global-search">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"></path></svg>
            <input id="lookup" placeholder="搜索精灵、蛋组、朋友、性格" autocomplete="off" />
          </div>
        </header>

        <section class="content-grid">
          <section class="primary-pane surface-card" id="assistantView">
            <div class="pane-head">
              <div>
                <h2>洛克王国虚拟助手</h2>
                <p id="assistantMeta">资料加载中</p>
              </div>
              <span class="muted-chip" id="status">就绪</span>
            </div>

            <div id="messages" class="messages"></div>

            <div class="starter-row" id="quickList"></div>

            <form id="chatForm" class="composer">
              <textarea id="chatInput" rows="2" placeholder="输入问题"></textarea>
              <button id="sendBtn" class="btn-primary" type="submit" aria-label="发送">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4 20-7Z"></path><path d="M22 2 11 13"></path></svg>
              </button>
            </form>
          </section>

          <section class="primary-pane surface-card hidden" id="spiritsView">
            <div class="pane-head">
              <div>
                <h2>精灵资料</h2>
                <p id="spiritMeta">资料加载中</p>
              </div>
              <span class="muted-chip" id="spiritCount">0 精灵</span>
            </div>
            <div class="dex-workbench">
              <div class="dex-toolbar">
                <label class="dex-search">
                  <span>名称 / 编号 / 形态</span>
                  <input id="spiritSearch" type="search" autocomplete="off" />
                </label>
                <label class="dex-select">
                  <span>蛋组</span>
                  <select id="dexEggGroup"></select>
                </label>
                <label class="dex-select">
                  <span>排序</span>
                  <select id="dexSort">
                    <option value="number">图鉴编号</option>
                    <option value="name">名称</option>
                    <option value="stage">阶段</option>
                    <option value="type">属性</option>
                    <option value="form">形态</option>
                  </select>
                </label>
                <button class="dex-reset" id="dexReset" type="button">查看全部</button>
              </div>

              <div class="dex-filter-panel">
                <section class="dex-filter-group">
                  <h3>精灵类型</h3>
                  <div class="filter-buttons" id="dexStageFilters"></div>
                </section>
                <section class="dex-filter-group">
                  <h3>特殊形态</h3>
                  <div class="filter-buttons" id="dexSpecialFilters"></div>
                </section>
                <section class="dex-filter-group">
                  <h3>精灵异色</h3>
                  <div class="filter-buttons" id="dexShinyFilters"></div>
                </section>
                <section class="dex-filter-group wide">
                  <h3>精灵属性</h3>
                  <div class="filter-buttons type-filters" id="dexTypeFilters"></div>
                </section>
              </div>

              <div class="dex-result-bar">
                <strong id="dexResultCount">0 / 0 条</strong>
                <div class="active-filters" id="dexActiveFilters"></div>
              </div>

              <div class="dex-grid" id="dexGrid"></div>
            </div>
          </section>

          <section class="primary-pane surface-card hidden" id="detailView">
            <div class="detail-content" id="detailContent"></div>
          </section>

          <section class="primary-pane surface-card hidden" id="groupsView">
            <div class="pane-head">
              <div>
                <h2>蛋组浏览</h2>
                <p id="groupMeta">资料加载中</p>
              </div>
              <span class="muted-chip" id="groupCount">0 蛋组</span>
            </div>
            <div class="group-grid" id="groupGrid"></div>
          </section>

          <section class="primary-pane surface-card hidden" id="exchangeView">
            <div class="pane-head">
              <div>
                <h2>共享交换表</h2>
                <p id="exchangeMeta">资料加载中</p>
              </div>
              <span class="muted-chip" id="exchangeCount">0 记录</span>
            </div>
            <div class="exchange-workbench">
              <section class="exchange-table-pane">
                <div class="exchange-toolbar">
                  <input id="exchangeFilter" placeholder="筛选玩家、精灵、性格、备注" />
                  <button id="exchangeAddRow" type="button">新增一行</button>
                  <button id="exchangeSaveAll" type="button">保存全部</button>
                  <button id="exchangeRefresh" type="button">刷新</button>
                </div>
                <div class="exchange-table-wrap">
                  <table class="exchange-table" id="exchangeTable">
                    <colgroup>
                      <col class="col-player" />
                      <col class="col-spirit" />
                      <col class="col-gender" />
                      <col class="col-nature" />
                      <col class="col-level" />
                      <col class="col-groups" />
                      <col class="col-stat" />
                      <col class="col-stat" />
                      <col class="col-stat" />
                      <col class="col-stat" />
                      <col class="col-stat" />
                      <col class="col-stat" />
                      <col class="col-note" />
                      <col class="col-actions" />
                    </colgroup>
                    <thead>
                      <tr>
                        <th><button class="sort-head" type="button" data-exchange-sort="player">玩家</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="spirit">精灵</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="gender">性别</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="nature">性格</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="level">等级</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="eggGroups">蛋组</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="stats.hp">生命</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="stats.attack">物攻</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="stats.magicAttack">魔攻</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="stats.defense">物防</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="stats.magicDefense">魔防</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="stats.speed">速度</button></th>
                        <th><button class="sort-head" type="button" data-exchange-sort="note">备注</button></th>
                        <th>操作</th>
                      </tr>
                      <tr class="exchange-filter-row">
                        <th><input data-exchange-filter="player" aria-label="筛选玩家" /></th>
                        <th><input data-exchange-filter="spirit" aria-label="筛选精灵" /></th>
                        <th>
                          <select data-exchange-filter="gender" aria-label="筛选性别">
                            <option value="">全部</option>
                            <option value="公">公</option>
                            <option value="母">母</option>
                            <option value="无性别">无性别</option>
                          </select>
                        </th>
                        <th><input data-exchange-filter="nature" aria-label="筛选性格" /></th>
                        <th><input data-exchange-filter="level" aria-label="筛选等级" /></th>
                        <th><input data-exchange-filter="eggGroups" aria-label="筛选蛋组" /></th>
                        <th><input data-exchange-filter="stats.hp" aria-label="筛选生命" /></th>
                        <th><input data-exchange-filter="stats.attack" aria-label="筛选物攻" /></th>
                        <th><input data-exchange-filter="stats.magicAttack" aria-label="筛选魔攻" /></th>
                        <th><input data-exchange-filter="stats.defense" aria-label="筛选物防" /></th>
                        <th><input data-exchange-filter="stats.magicDefense" aria-label="筛选魔防" /></th>
                        <th><input data-exchange-filter="stats.speed" aria-label="筛选速度" /></th>
                        <th><input data-exchange-filter="note" aria-label="筛选备注" /></th>
                        <th><button class="clear-filters" id="exchangeClearFilters" type="button">清筛选</button></th>
                      </tr>
                    </thead>
                    <tbody id="exchangeTableBody"></tbody>
                  </table>
                </div>
              </section>
            </div>
            <datalist id="spiritNameList"></datalist>
            <datalist id="natureList"></datalist>
          </section>

          <aside class="inspector surface-card">
            <div class="pane-head compact">
              <div>
                <h2>匹配资料</h2>
                <p id="resultMeta">输入关键词后显示结果</p>
              </div>
            </div>

            <div class="inspector-scroll">
              <section class="result-section">
                <h3>精灵</h3>
                <div id="spirits" class="result-list"></div>
              </section>
              <section class="result-section">
                <h3>蛋组</h3>
                <div id="groups" class="result-list"></div>
              </section>
              <section class="result-section">
                <h3>交换记录</h3>
                <div id="exchange" class="result-list"></div>
              </section>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <script src="/app.js?v=20260507-2" type="module"></script>
  </body>
</html>
